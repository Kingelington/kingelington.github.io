<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar">
  <div class="nav-container" id="navbar"></div>
</header>

 <!-- HERO -->
 <div class="project-container">
    <section class="project-intro">
      <canvas id = "ai-bg"></canvas>
    </section>

    <section class="gameproject-section" id="gameproject-section">
      <h2 class ="center-title"> Games</h2>
      <div id="game-container"></div>
      </section>

  <script>
  window.addEventListener("scroll", function () {
    const navbar = document.querySelector(".navbar");
    if (window.scrollY > 50) {
      navbar.style.background = "rgba(0, 0, 0, 0.85)";
      navbar.style.backdropFilter = "blur(10px)";
    } else {
      navbar.style.background = "transparent";
      navbar.style.backdropFilter = "none";
    }
  });
</script>

<script>
const sections = document.querySelectorAll('.fade-section');

const options = {
  threshold: 0.1,   // 10% av sektionen syns
  rootMargin: "0px 0px -50px 0px"
};

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');   // fadea in
    } else {
      entry.target.classList.remove('visible'); // fadea ut
    }
  });
}, options);

sections.forEach(section => observer.observe(section));
</script>

<script src="script.js"></script>
<script src="navbar.js"></script>
<script src="footer.js"></script>
</body>
</html>
