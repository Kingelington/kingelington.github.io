<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar">
  <div class="nav-container" id="navbar"></div>
</header>

<body>
<div class="gameproject">

  <!-- Video -->
  <div class="gameproject-video">
    <iframe 
      src="https://www.youtube.com/embed/-ZFUS_c8AGw?si=OsenFBSC5YddUA5N"
      title="Project Video"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Title -->
  <h2 class="gameproject-title">Cyberboard</h2>

  <!-- Details Window -->
  <div class="gameproject-details">
    <div><strong>Engine:</strong> Unity</div>
    <div><strong>Language:</strong> C#</div>
    <div><strong>Duration:</strong> 6 weeks</div>
  </div>

  <!-- Summary -->
  <div class="gameproject-summary">
    <h3>Summary</h3>
    <p>
      This was our first game project at The Game Assembly. 
    </p>
  </div>

  <!-- Contributions -->
  <div class="gameproject-contributions">
   <h3>My Contributions</h3>
    <ul>
      <li>Custom tutorial game object logic</li>
      <li>SFX implementation</li>
      <li>UI interaction functionality</li>
    </ul>
  </div>

  <!-- Screenshot Gallery -->
<div class="gameproject-gallery-wrapper">

  <button class="gallery-btn left">‹</button>

  <div class="gameproject-gallery">
    <img src="images/project1.png" alt="">
    <img src="images/project1.png" alt="">
    <img src="images/project2.png" alt="">
    <img src="images/project1.png" alt="">
    <img src="images/project1.png" alt="">
  </div>

  <button class="gallery-btn right">›</button>

</div>
</div>




<script>
const gallery = document.querySelector('.gameproject-gallery');

document.querySelector('.gallery-btn.left').onclick = () => {
  gallery.scrollBy({ left: -300, behavior: 'smooth' });
};

document.querySelector('.gallery-btn.right').onclick = () => {
  gallery.scrollBy({ left: 300, behavior: 'smooth' });
};
</script>

<script src="navbar.js"></script>
<script src="footer.js"></script>
</body>

</html>
